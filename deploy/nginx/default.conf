server {
    listen 80;
    server_name almanakademisi.com www.almanakademisi.com;

    # Allow ACME challenge for certbot (webroot) and redirect other traffic to HTTPS
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name almanakademisi.com www.almanakademisi.com;

    # Let's Encrypt cert paths (will be created by certbot)
    ssl_certificate /etc/letsencrypt/live/almanakademisi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/almanakademisi.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Proxy /api to backend service (Django) on :8000 (assumes backend on localhost)
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
        proxy_redirect off;
    }

    # Proxy everything else to frontend on :3000 (assumes frontend on localhost)
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000;
        proxy_redirect off;
    }
}
