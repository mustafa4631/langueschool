version: '3.8'
services:
  nginx:
    image: nginx:stable
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - proxy-net
    restart: unless-stopped

networks:
  proxy-net:
    driver: bridge
