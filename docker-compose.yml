services:
  db:
    image: postgres:15-alpine
    container_name: langueschool_db
    environment:
      POSTGRES_DB: ${DB_NAME:-langueschool_db}
      POSTGRES_USER: ${DB_USER:-langueschool_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-M.g.4646}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-langueschool_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: langueschool_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: langueschool_frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
